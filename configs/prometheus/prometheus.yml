global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets: ["10.60.0.61:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["10.60.0.60:8080"]

  - job_name: traefik
    metrics_path: /metrics
    static_configs:
      - targets: ["10.10.0.10:8082"]

  - job_name: n8n
    metrics_path: /metrics
    static_configs:
      - targets: ["10.20.0.10:5678"]

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["10.30.0.40:9000"]
