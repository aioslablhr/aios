global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: n8n
    metrics_path: /metrics
    static_configs:
      - targets: ["10.20.0.10:5678"]

  - job_name: traefik
    metrics_path: /metrics
    static_configs:
      - targets: ["10.10.0.10:8080"]

  - job_name: bifrost
    metrics_path: /metrics
    static_configs:
      - targets: ["10.40.0.10:4000"]

  - job_name: frigate
    metrics_path: /metrics
    static_configs:
      - targets: ["10.40.0.50:5000"]
