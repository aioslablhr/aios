# AIOS — Traefik Dynamic Configuration
# Public: landing page + FOSS apps (deployed). Internal via LAN/WireGuard.

http:
  middlewares:
    crowdsec-bouncer:
      plugin:
        bouncer:
          crowdsecLAPIUrl: http://10.10.0.11:8080
          crowdsecLAPIKey: "YWuWVzg89fN0HqBs71qDc8sxzcLxofC45jxvJQM/vbk"
          secure: false
          updateIntervalSeconds: 30

    secure-headers:
      headers:
        frameDeny: true
        sslRedirect: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"

  routers:
    # Landing page — socialbeesai.com
    landing:
      rule: "Host(`socialbeesai.com`) || Host(`www.socialbeesai.com`)"
      service: landing
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer
        - secure-headers

    # Open WebUI — chat.socialbeesai.com
    foss-open-webui:
      rule: "Host(`chat.socialbeesai.com`)"
      service: foss-open-webui
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

  services:
    # Landing page — points to Dashy
    landing:
      loadBalancer:
        servers:
          - url: "http://10.60.0.70:8080"

    # Open WebUI — public chat interface
    foss-open-webui:
      loadBalancer:
        servers:
          - url: "http://10.70.0.200:8080"
