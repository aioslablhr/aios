# AIOS — Traefik Dynamic Configuration
# Auto-loaded from /etc/traefik/dynamic/

# ── Middlewares ──────────────────────────────────

http:
  middlewares:
    # CrowdSec bouncer — blocks malicious IPs
    crowdsec-bouncer:
      plugin:
        bouncer:
          crowdsecLAPIUrl: http://10.10.0.11:8080
          crowdsecLAPIKey: "YWuWVzg89fN0HqBs71qDc8sxzcLxofC45jxvJQM/vbk"
          secure: false
          updateIntervalSeconds: 30

    # Security headers
    secure-headers:
      headers:
        frameDeny: true
        sslRedirect: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"

    # Rate limiting
    rate-limit:
      rateLimit:
        average: 100
        burst: 200

    # Error page for unavailable services
    error-page:
      errors:
        status:
          - "500-599"
        service: error-service
        query: "/"

  # ── Routers ─────────────────────────────────────

  routers:
    # Traefik dashboard — admin.socialbeesai.com
    traefik-dashboard:
      rule: "Host(`admin.socialbeesai.com`)"
      service: api@internal
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer
        - secure-headers

    # Landing page — socialbeesai.com
    landing:
      rule: "Host(`socialbeesai.com`) || Host(`www.socialbeesai.com`)"
      service: landing
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer
        - secure-headers

    # App subdomain — app.socialbeesai.com
    app-n8n:
      rule: "Host(`app.socialbeesai.com`) && PathPrefix(`/n8n`)"
      service: app-n8n
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    app-flowise:
      rule: "Host(`app.socialbeesai.com`) && PathPrefix(`/flowise`)"
      service: app-flowise
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    # Monitor subdomain — monitor.socialbeesai.com
    mon-grafana:
      rule: "Host(`monitor.socialbeesai.com`) && PathPrefix(`/grafana`)"
      service: mon-grafana
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    mon-prometheus:
      rule: "Host(`monitor.socialbeesai.com`) && PathPrefix(`/prometheus`)"
      service: mon-prometheus
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    mon-portainer:
      rule: "Host(`monitor.socialbeesai.com`) && PathPrefix(`/portainer`)"
      service: mon-portainer
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    # Data subdomain — data.socialbeesai.com
    data-supabase:
      rule: "Host(`data.socialbeesai.com`)"
      service: data-supabase
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    data-minio:
      rule: "Host(`data.socialbeesai.com`) && PathPrefix(`/minio`)"
      service: data-minio
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    # AI subdomain — ai.socialbeesai.com
    ai-bifrost:
      rule: "Host(`ai.socialbeesai.com`) && PathPrefix(`/bifrost`)"
      service: ai-bifrost
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    ai-chat:
      rule: "Host(`chat.socialbeesai.com`)"
      service: ai-open-webui
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    # Voice subdomain — voice.socialbeesai.com
    voice-asterisk:
      rule: "Host(`voice.socialbeesai.com`) && PathPrefix(`/asterisk`)"
      service: voice-asterisk
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    voice-dograh:
      rule: "Host(`voice.socialbeesai.com`) && PathPrefix(`/dograh`)"
      service: voice-dograh
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

  # ── Services ────────────────────────────────────

  services:
    # Landing page
    landing:
      loadBalancer:
        servers:
          - url: "http://10.60.0.70:8080"

    # Error service for unavailable backends
    error-service:
      loadBalancer:
        servers:
          - url: "http://10.60.0.70:8080"

    # App services (placeholder — will be filled when deployed)
