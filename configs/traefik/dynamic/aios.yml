# AIOS — Traefik Dynamic Configuration
# Public: landing page only. FOSS apps when deployed.
# Internal services via WireGuard VPN / LAN IPs.

http:
  middlewares:
    crowdsec-bouncer:
      plugin:
        bouncer:
          crowdsecLAPIUrl: http://10.10.0.11:8080
          crowdsecLAPIKey: "YWuWVzg89fN0HqBs71qDc8sxzcLxofC45jxvJQM/vbk"
          secure: false
          updateIntervalSeconds: 30

    secure-headers:
      headers:
        frameDeny: true
        sslRedirect: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"

  routers:
    landing:
      rule: "Host(`socialbeesai.com`) || Host(`www.socialbeesai.com`)"
      service: landing
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer
        - secure-headers

  services:
    landing:
      loadBalancer:
        servers:
          - url: "http://10.60.0.70:8080"
