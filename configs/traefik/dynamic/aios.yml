# AIOS — Traefik Dynamic Configuration
# Auto-loaded from /etc/traefik/dynamic/

# ── Middlewares ──────────────────────────────────

http:
  middlewares:
    # CrowdSec bouncer — blocks malicious IPs
    crowdsec-bouncer:
      plugin:
        bouncer:
          crowdsecLAPIUrl: http://10.10.0.11:8080
          crowdsecLAPIKey: "YWuWVzg89fN0HqBs71qDc8sxzcLxofC45jxvJQM/vbk"
          secure: false
          updateIntervalSeconds: 30

    # Security headers
    secure-headers:
      headers:
        frameDeny: true
        sslRedirect: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"

    # Strip prefix for subpath backends
    strip-portainer:
      stripPrefix:
        prefixes:
          - /portainer
    strip-cadvisor:
      stripPrefix:
        prefixes:
          - /cadvisor

  # ── Routers ─────────────────────────────────────

  routers:
    # Landing page — socialbeesai.com
    landing:
      rule: "Host(`socialbeesai.com`) || Host(`www.socialbeesai.com`)"
      service: landing
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer
        - secure-headers

    # Traefik dashboard — admin.socialbeesai.com
    traefik-dashboard:
      rule: "Host(`admin.socialbeesai.com`)"
      service: api@internal
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    # n8n — n8n.socialbeesai.com
    app-n8n:
      rule: "Host(`n8n.socialbeesai.com`)"
      service: app-n8n
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    # Bifrost — ai.socialbeesai.com
    ai-bifrost:
      rule: "Host(`ai.socialbeesai.com`)"
      service: ai-bifrost
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    # Langfuse — langfuse.socialbeesai.com
    mon-langfuse:
      rule: "Host(`langfuse.socialbeesai.com`)"
      service: mon-langfuse
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    # Keycloak — keycloak.socialbeesai.com
    admin-keycloak:
      rule: "Host(`keycloak.socialbeesai.com`)"
      service: admin-keycloak
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    # Vault — vault.socialbeesai.com
    admin-vault:
      rule: "Host(`vault.socialbeesai.com`)"
      service: admin-vault
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    # Dograh — voice.socialbeesai.com
    voice-dograh:
      rule: "Host(`voice.socialbeesai.com`)"
      service: voice-dograh
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    # MinIO — data.socialbeesai.com/minio
    data-minio:
      rule: "Host(`data.socialbeesai.com`) && PathPrefix(`/minio`)"
      service: data-minio
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    # Grafana — monitor.socialbeesai.com/grafana
    mon-grafana:
      rule: "Host(`monitor.socialbeesai.com`) && PathPrefix(`/grafana`)"
      service: mon-grafana
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    # Prometheus — monitor.socialbeesai.com/prometheus
    mon-prometheus:
      rule: "Host(`monitor.socialbeesai.com`) && PathPrefix(`/prometheus`)"
      service: mon-prometheus
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    # Portainer — monitor.socialbeesai.com/portainer
    mon-portainer:
      rule: "Host(`monitor.socialbeesai.com`) && PathPrefix(`/portainer`)"
      service: mon-portainer
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer
        - strip-portainer

    # cAdvisor — monitor.socialbeesai.com/cadvisor
    mon-cadvisor:
      rule: "Host(`monitor.socialbeesai.com`) && PathPrefix(`/cadvisor`)"
      service: mon-cadvisor
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer
        - strip-cadvisor

    # Qdrant — qdrant.socialbeesai.com
    data-qdrant:
      rule: "Host(`qdrant.socialbeesai.com`) && PathPrefix(`/dashboard`)"
      service: data-qdrant
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    # ClickHouse — clickhouse.socialbeesai.com
    mon-clickhouse:
      rule: "Host(`clickhouse.socialbeesai.com`)"
      service: mon-clickhouse
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

    # Frigate — frigate.socialbeesai.com
    ai-frigate:
      rule: "Host(`frigate.socialbeesai.com`)"
      service: ai-frigate
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare
      middlewares:
        - crowdsec-bouncer

  # ── Services ────────────────────────────────────

  services:
    landing:
      loadBalancer:
        servers:
          - url: "http://10.60.0.70:8080"

    app-n8n:
      loadBalancer:
        servers:
          - url: "http://10.20.0.10:5678"

    ai-bifrost:
      loadBalancer:
        servers:
          - url: "http://10.40.0.10:4000"

    mon-langfuse:
      loadBalancer:
        servers:
          - url: "http://10.60.0.10:3000"

    admin-keycloak:
      loadBalancer:
        servers:
          - url: "http://10.20.0.40:8080"

    admin-vault:
      loadBalancer:
        servers:
          - url: "http://10.0.0.100:8200"

    voice-dograh:
      loadBalancer:
        servers:
          - url: "http://10.50.0.31:3010"

    data-minio:
      loadBalancer:
        servers:
          - url: "http://10.30.0.40:9001"

    mon-grafana:
      loadBalancer:
        servers:
          - url: "http://10.60.0.30:3000"

    mon-prometheus:
      loadBalancer:
        servers:
          - url: "http://10.60.0.20:9090"

    mon-portainer:
      loadBalancer:
        servers:
          - url: "http://10.60.0.50:9000"

    mon-cadvisor:
      loadBalancer:
        servers:
          - url: "http://10.60.0.60:8080"

    data-qdrant:
      loadBalancer:
        servers:
          - url: "http://10.30.0.20:6333"

    mon-clickhouse:
      loadBalancer:
        servers:
          - url: "http://10.60.0.11:8123"

    ai-frigate:
      loadBalancer:
        servers:
          - url: "http://10.40.0.50:5000"
