general_settings:
  master_key: sk-aios-master-admin-key-change-me

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: true
  cache_params:
    type: redis
    host: 10.30.0.30
    port: 6379
    ttl: 3600
    mode: default_semantic
    similarity_threshold: 0.85

model_list:
  # ── TIER 2: LOCAL GPU OLLAMA (fast Q&A, classification, multilingual) ──
  - model_name: local-fast
    litellm_params:
      model: ollama/mistral
      api_base: http://10.40.0.20:11434
      rpm: 60
  - model_name: local-fast
    litellm_params:
      model: ollama/qwen2.5
      api_base: http://10.40.0.20:11434
      rpm: 60
  - model_name: local-fast
    litellm_params:
      model: ollama/llama3.2
      api_base: http://10.40.0.20:11434
      rpm: 60

  # ── TIER 3: OPENROUTER FREE — GENERAL REASONING ──
  - model_name: general-reasoning
    litellm_params:
      model: openrouter/google/gemma-4-31b-it:free
      api_key: ${OPENROUTER_API_KEY}
  - model_name: general-reasoning
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct:free
      api_key: ${OPENROUTER_API_KEY}
  - model_name: general-reasoning
    litellm_params:
      model: openrouter/nousresearch/hermes-3-llama-3.1-405b:free
      api_key: ${OPENROUTER_API_KEY}
  - model_name: general-reasoning
    litellm_params:
      model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
      api_key: ${OPENROUTER_API_KEY}

  # ── TIER 3: OPENROUTER FREE — MULTILINGUAL ──
  - model_name: multilingual
    litellm_params:
      model: openrouter/qwen/qwen3-next-80b-a3b-instruct:free
      api_key: ${OPENROUTER_API_KEY}
  - model_name: multilingual
    litellm_params:
      model: openrouter/google/gemma-4-31b-it:free
      api_key: ${OPENROUTER_API_KEY}

  # ── TIER 3: OPENROUTER FREE — CODE ──
  - model_name: code
    litellm_params:
      model: openrouter/qwen/qwen3-coder:free
      api_key: ${OPENROUTER_API_KEY}
  - model_name: code
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash:free
      api_key: ${OPENROUTER_API_KEY}
  - model_name: code
    litellm_params:
      model: openrouter/openai/gpt-oss-120b:free
      api_key: ${OPENROUTER_API_KEY}

  # ── TIER 3: OPENROUTER FREE — FAST/SIMPLE ──
  - model_name: fast-simple
    litellm_params:
      model: openrouter/baidu/cobuddy:free
      api_key: ${OPENROUTER_API_KEY}
  - model_name: fast-simple
    litellm_params:
      model: openrouter/meta-llama/llama-3.2-3b-instruct:free
      api_key: ${OPENROUTER_API_KEY}
  - model_name: fast-simple
    litellm_params:
      model: openrouter/liquid/lfm-2.5-1.2b-instruct:free
      api_key: ${OPENROUTER_API_KEY}

  # ── TIER 4: OPENROUTER PAID — FRONTIER (via OpenRouter, NOT direct API) ──
  - model_name: frontier-reasoning
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4
      api_key: ${OPENROUTER_API_KEY}
  - model_name: frontier-reasoning
    litellm_params:
      model: openrouter/openai/gpt-4o
      api_key: ${OPENROUTER_API_KEY}
  - model_name: frontier-vision
    litellm_params:
      model: openrouter/openai/gpt-4o-vision
      api_key: ${OPENROUTER_API_KEY}
  - model_name: frontier-vision
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4
      api_key: ${OPENROUTER_API_KEY}
  - model_name: frontier-code
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4
      api_key: ${OPENROUTER_API_KEY}
  - model_name: frontier-code
    litellm_params:
      model: openrouter/openai/gpt-4o
      api_key: ${OPENROUTER_API_KEY}

router_settings:
  routing_strategy: usage-based
  enable_pre_call_checks: true
  allowed_fails: 3
  num_retries: 2

  # ── CROSS-TIER FALLBACK CHAINS ──
  fallbacks:
    # Tier 2 → Tier 3 (local down → free cloud)
    - local-fast: [general-reasoning, fast-simple]

    # Tier 3 fallbacks within free tier
    - general-reasoning: [multilingual, fast-simple]
    - multilingual: [general-reasoning]
    - code: [general-reasoning]
    - fast-simple: [local-fast, general-reasoning]

    # Tier 3 → Tier 4 (free fails → paid frontier)
    - general-reasoning: [frontier-reasoning]
    - multilingual: [frontier-reasoning]
    - code: [frontier-code]

    # Tier 4 fallback between paid models
    - frontier-reasoning: [frontier-vision]
    - frontier-vision: [frontier-reasoning]
    - frontier-code: [frontier-reasoning]

  # ── LOGGING ──
  alerting:
    - langfuse

langfuse_settings:
  host: http://10.60.0.10:3000
  public_key: ${LANGFUSE_PUBLIC_KEY}
  secret_key: ${LANGFUSE_SECRET_KEY}
