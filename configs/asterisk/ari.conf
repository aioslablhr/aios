[general]
enabled = yes
pretty = yes
allowed_origins = *

; Admin user — full ARI access for AI integration
[aios-admin]
  type = user
  read_only = no
  password = ${ARI_ADMIN_PASSWORD}
  password_format = plain

; Dograh voice agent — used by ARI manager for WebSocket + REST
[dograh]
  type = user
  read_only = no
  password = ${ARI_ADMIN_PASSWORD}
  password_format = plain
