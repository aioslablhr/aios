[global]
type = global
endpoint_identifier_order = ip,username,anonymous
default_outbound_endpoint = default_outbound

[system]
type = system

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

[transport-tcp]
type = transport
protocol = tcp
bind = 0.0.0.0:5060

[transport-wss]
type = transport
protocol = wss
bind = 0.0.0.0:5061

[phone-template](!)
type = endpoint
context = internal
disallow = all
allow = ulaw
allow = alaw
allow = g722
direct_media = no
trust_id_inbound = yes
trust_id_outbound = yes
send_pai = yes
rtp_symmetric = yes
force_rport = no
rewrite_contact = yes
dtmf_mode = rfc4733
media_encryption = no
ice_support = yes

[auth-template](!)
type = auth
auth_type = userpass

[aor-template](!)
type = aor
max_contacts = 1
remove_existing = yes
qualify_frequency = 30

[default_outbound](!)
type = endpoint
context = internal
disallow = all

[100](phone-template)
aors = 100
auth = auth100
callerid = "Admin" <100>

[auth100](auth-template)
username = 100
password = ${EXT_100_SECRET}
realm = asterisk

[100](aor-template)

