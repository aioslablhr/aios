[general]
static = yes
writeprotect = no
clearglobalvars = no

[globals]
TRUNK_NUMBER=0
AI_AGENT_EXT=102

[internal]
; Extension 100 — Admin desk
exten => 100,1,NoOp(Admin desk call)
same => n,Dial(PJSIP/100,30)
same => n,VoiceMail(100@default,u)
same => n,Hangup()

; Extension 101 — Support desk
exten => 101,1,NoOp(Support desk call)
same => n,Dial(PJSIP/101,30)
same => n,VoiceMail(101@default,u)
same => n,Hangup()

; Extension 102 — AI Agent
exten => 102,1,NoOp(AI Agent call)
same => n,Stasis(dograh)
same => n,Hangup()

; Extension 103 — Test Softphone
exten => 103,1,NoOp(Test Softphone call)
same => n,Dial(PJSIP/103,30)
same => n,Hangup()

; Extension 104 — Android Softphone
exten => 104,1,NoOp(Android Softphone call)
same => n,Dial(PJSIP/104,30)
same => n,Hangup()

; Extension 9000 — Test Line (Cisco)
exten => 9000,1,NoOp(Test Line call)
same => n,Dial(PJSIP/9000,30)
same => n,Hangup()

; Dial by extension (3-digit)
exten => _XXX,1,NoOp(Dialing extension ${EXTEN})
same => n,Dial(PJSIP/${EXTEN},30)
same => n,VoiceMail(${EXTEN}@default,u)
same => n,Hangup()

; Dial by extension (4-digit)
exten => _XXXX,1,NoOp(Dialing extension ${EXTEN})
same => n,Dial(PJSIP/${EXTEN},30)
same => n,Hangup()

; Conference bridge (8)
exten => 8,1,NoOp(Conference bridge)
same => n,ConfBridge(1000,default_bridge,default_user)

; Voicemail access
exten => *97,1,NoOp(Voicemail access)
same => n,VoiceMailMain(@default)
same => n,Hangup()

; Operator (0)
exten => 0,1,NoOp(Operator call)
same => n,Dial(PJSIP/100,20)
same => n,VoiceMail(100@default,u)
same => n,Hangup()

[ivr-main]
exten => s,1,NoOp(IVR Main)
same => n,Answer()
same => n(play),Playback(welcome)
same => n,Read(DIGITS,ivr-options,1)
same => n,GotoIf($["${DIGITS}" = "1"]?support)
same => n,GotoIf($["${DIGITS}" = "2"]?ai-agent)
same => n,GotoIf($["${DIGITS}" = "3"]?directory)
same => n,GotoIf($["${DIGITS}" = "0"]?operator)
same => n,Playback(invalid)
same => n,Goto(play)
same => n(support),Goto(internal,101,1)
same => n(ai-agent),Goto(internal,102,1)
same => n(directory),Playback(directory)
same => n,Goto(play)
same => n(operator),Goto(internal,100,1)

[from-trunk]
exten => _X.,1,NoOp(Incoming call from trunk: ${CALLERID(all)})
same => n,Goto(ivr-main,s,1)

[default_bridge]
type = bridge
language = en

[default_user]
type = user
