# AIOS Temporary DHCP+TFTP for Cisco 7962 provisioning
# Start: docker run --rm --name dnsmasq --net=host -v /tftp:/tftp -v /aios/configs/dnsmasq/dnsmasq.conf:/etc/dnsmasq.conf alexeiled/dnsmasq
# Stop: docker stop dnsmasq

# Listen on 10.0.0.1 only
bind-interfaces
interface=eno1
listen-address=10.0.0.1

# DHCP — short lease, temporary
dhcp-range=10.0.0.50,10.0.0.200,255.255.255.0,10m
dhcp-option=3,10.0.0.1
dhcp-option=6,10.0.0.1

# TFTP server for Cisco phones
enable-tftp
tftp-root=/tftp

# Cisco options: TFTP server IP
dhcp-option=66,10.0.0.1
dhcp-option=150,10.0.0.1

# Logging
log-queries
log-dhcp
