mqtt:
  enabled: true
  host: 10.50.0.20
  port: 1883
  topic_prefix: frigate
  client_id: frigate

cameras:
  entrance:
    enabled: true
    ffmpeg:
      input_args: preset-rtsp-udp
      inputs:
        - path: rtsp://admin:Lahore999!@10.0.0.51:554/cam/realmonitor?channel=1&subtype=1
          roles:
            - detect
        - path: rtsp://admin:Lahore999!@10.0.0.51:554/cam/realmonitor?channel=1&subtype=0
          roles:
            - record
    detect:
      width: 704
      height: 576
      fps: 5
    record:
      enabled: true
    snapshots:
      enabled: true
      timestamp: true
      bounding_box: true
    objects:
      track:
        - person
        - car
        - dog
        - cat
    zones:
      entrance_area:
        coordinates: 0.2,0.3, 0.8,0.3, 0.8,0.9, 0.2,0.9
        objects:
          - person
          - car

detectors:
  cpu1:
    type: cpu



record:
  enabled: true
  motion:
    days: 7
  alerts:
    retain:
      days: 30
      mode: motion
  detections:
    retain:
      days: 30
      mode: motion

snapshots:
  enabled: true
  retain:
    default: 30

objects:
  track:
    - person
    - car
    - dog
    - cat
  filters:
    person:
      min_score: 0.7
    car:
      min_score: 0.6

go2rtc:
  streams:
    entrance: rtsp://admin:Lahore999!@10.0.0.51:554/cam/realmonitor?channel=1&subtype=0
    entrance_sub: rtsp://admin:Lahore999!@10.0.0.51:554/cam/realmonitor?channel=1&subtype=1
