<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emma — SHIN Travels AI Assistant</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .chat-container {
    width: 420px; max-width: 96vw; height: 85vh; max-height: 750px;
    background: #1a1a2e; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,.5);
    display: flex; flex-direction: column; overflow: hidden;
    border: 1px solid rgba(255,255,255,.08);
  }
  .chat-header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding: 20px 24px; color: white; flex-shrink: 0;
  }
  .chat-header h1 { font-size: 18px; font-weight: 600; }
  .chat-header p { font-size: 13px; opacity: .85; margin-top: 4px; }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
    scroll-behavior: smooth;
  }
  .message {
    max-width: 85%; padding: 12px 16px; border-radius: 16px;
    line-height: 1.5; font-size: 14px; animation: fadeIn .3s ease;
  }
  .message.user {
    align-self: flex-end; background: #667eea; color: white;
    border-bottom-right-radius: 4px;
  }
  .message.bot {
    align-self: flex-start; background: #2d2d44; color: #e0e0e0;
    border-bottom-left-radius: 4px;
  }
  .message.system {
    align-self: center; background: transparent; color: #666;
    font-size: 12px; font-style: italic;
  }
  .typing {
    align-self: flex-start; background: #2d2d44; border-radius: 16px;
    padding: 12px 20px; display: flex; gap: 4px;
    border-bottom-left-radius: 4px;
  }
  .typing span { width: 8px; height: 8px; background: #667eea; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
  .typing span:nth-child(1) { animation-delay: -.32s; }
  .typing span:nth-child(2) { animation-delay: -.16s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .chat-input-area {
    padding: 16px 20px; background: #12122a; display: flex; gap: 10px;
    border-top: 1px solid rgba(255,255,255,.06); flex-shrink: 0;
  }
  .chat-input-area input {
    flex: 1; padding: 12px 16px; border: 1px solid rgba(255,255,255,.1);
    border-radius: 12px; background: #1e1e38; color: white;
    font-size: 14px; outline: none; transition: border .2s;
  }
  .chat-input-area input:focus { border-color: #667eea; }
  .chat-input-area input::placeholder { color: #666; }
  .chat-input-area button {
    padding: 12px 20px; background: linear-gradient(135deg, #667eea, #764ba2);
    border: none; border-radius: 12px; color: white; font-size: 14px;
    font-weight: 600; cursor: pointer; transition: opacity .2s;
  }
  .chat-input-area button:disabled { opacity: .5; cursor: not-allowed; }
  .chat-input-area button:hover:not(:disabled) { opacity: .9; }
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <h1>✈️ Emma — SHIN Travels</h1>
    <p>AI Travel Assistant & Booking Agent</p>
  </div>
  <div class="chat-messages" id="messages"></div>
  <div class="chat-input-area">
    <input type="text" id="input" placeholder="Ask about flights, packages, or destinations..." autofocus>
    <button id="sendBtn" disabled>Send</button>
  </div>
</div>
<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
let sessionId = null;
let loading = false;
// API base from current path (handles /chat prefix from Traefik stripPrefix)
const API = window.location.pathname.replace(/\/$/, '') + '/api';

function addMsg(text, role) {
  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function init() {
  addMsg('Connecting to Emma...', 'system');
  try {
    const r = await fetch(API + '/sessions', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    const data = await r.json();
    sessionId = data.workflow_run_id;
    messages.lastChild.remove();
    sendBtn.disabled = false;
    input.focus();
    // The server auto-injects company knowledge; wait briefly then fetch
    await new Promise(r => setTimeout(r, 1500));
    const sr = await fetch(API + '/sessions/' + sessionId);
    const sd = await sr.json();
    const turns = sd.session_data?.turns || [];
    for (const t of turns) {
      if (t.assistant_message?.text) {
        addMsg(t.assistant_message.text, 'bot');
      }
    }
  } catch (e) {
    messages.lastChild.remove();
    addMsg('Could not connect. Please try again later.', 'system');
  }
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || loading || !sessionId) return;
  loading = true;
  sendBtn.disabled = true;
  addMsg(text, 'user');
  input.value = '';
  showTyping();
  try {
    const r = await fetch(API + '/sessions/' + sessionId + '/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    hideTyping();
    const data = await r.json();
    const turns = data.session_data?.turns || [];
    const last = turns[turns.length - 1];
    if (last?.assistant_message?.text) {
      addMsg(last.assistant_message.text, 'bot');
    }
  } catch (e) {
    hideTyping();
    addMsg('Sorry, something went wrong. Please try again.', 'system');
  }
  loading = false;
  sendBtn.disabled = false;
  input.focus();
}

input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
sendBtn.addEventListener('click', sendMessage);
init();
</script>
</body>
</html>
