<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emma - SHIN Travels</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#111214;height:100vh;display:flex;flex-direction:column;color:#e1e1e3}
.header{background:#1a1b1e;border-bottom:1px solid #2a2b2e;padding:16px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.header h1{font-size:18px;font-weight:600;color:#e1e1e3}
.header .sub{font-size:12px;color:#888;margin-top:2px}
.avatar{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.chat-area{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:80%;padding:12px 16px;border-radius:12px;line-height:1.5;font-size:14px;animation:fadeIn .3s ease}
.msg.user{background:#3b82f6;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.bot{background:#1e1f23;color:#e1e1e3;align-self:flex-start;border-bottom-left-radius:4px;border:1px solid #2a2b2e}
.msg.bot .sender{font-size:11px;color:#888;margin-bottom:4px;font-weight:600}
.typing{display:flex;gap:4px;padding:12px 16px;background:#1e1f23;border-radius:12px;align-self:flex-start;border-bottom-left-radius:4px;border:1px solid #2a2b2e}
.typing span{width:8px;height:8px;background:#555;border-radius:50%;animation:bounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.input-area{background:#1a1b1e;border-top:1px solid #2a2b2e;padding:12px 16px;display:flex;gap:8px;flex-shrink:0}
.input-area input{flex:1;background:#0d0e10;border:1px solid #2a2b2e;border-radius:10px;padding:12px 16px;font-size:14px;color:#e1e1e3;outline:none;transition:border .2s}
.input-area input:focus{border-color:#3b82f6}
.input-area input::placeholder{color:#555}
.input-area button{background:#3b82f6;color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.input-area button:hover{background:#2563eb}
.input-area button:disabled{background:#1e3a5f;cursor:not-allowed}
.welcome{text-align:center;padding:40px 20px;color:#888}
.welcome h2{font-size:20px;color:#e1e1e3;margin-bottom:8px}
.welcome p{font-size:14px;line-height:1.6}
.status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="header">
<div class="avatar">E</div>
<div>
<h1><span class="status-dot"></span>Emma — SHIN Travels</h1>
<div class="sub">AI Sales Agent</div>
</div>
</div>
<div class="chat-area" id="chatArea">
<div class="welcome" id="welcome">
<h2>Welcome to SHIN Travels</h2>
<p>Ask me about Umrah packages, holiday destinations, flight bookings, or any travel plans. I'm here to help!</p>
</div>
</div>
<div class="input-area">
<input type="text" id="userInput" placeholder="Type your message..." autofocus>
<button id="sendBtn">Send</button>
</div>
<script>
const BASE = location.pathname.replace(/\/+$/, '');
let sessionId = null;

async function startSession() {
try {
const resp = await fetch(BASE + '/api/sessions', {method:'POST'});
const data = await resp.json();
sessionId = data.workflow_run_id;
const turns = data.session_data?.turns || [];
for (const t of turns) {
if (t.assistant_message?.text) addMessage(t.assistant_message.text, false, true);
}
document.getElementById('welcome').style.display = 'none';
} catch(e) {
addMessage('Failed to connect. Please refresh.', false);
}
}

function addMessage(text, isUser = false) {
const area = document.getElementById('chatArea');
const d = document.createElement('div');
d.className = 'msg ' + (isUser ? 'user' : 'bot');
if (!isUser) {
const s = document.createElement('div'); s.className = 'sender'; s.textContent = 'Emma';
d.appendChild(s);
}
const p = document.createElement('div'); p.textContent = text;
d.appendChild(p);
area.appendChild(d);
area.scrollTop = area.scrollHeight;
}

function showTyping() {
const area = document.getElementById('chatArea');
const d = document.createElement('div'); d.className = 'typing'; d.id = 'typing';
for(let i=0;i<3;i++){const s=document.createElement('span');d.appendChild(s)}
area.appendChild(d);
area.scrollTop = area.scrollHeight;
}

function hideTyping() {
const t = document.getElementById('typing');
if(t) t.remove();
}

async function sendMessage() {
const input = document.getElementById('userInput');
const btn = document.getElementById('sendBtn');
const text = input.value.trim();
if (!text || !sessionId) return;
input.value = '';
btn.disabled = true;
addMessage(text, true);
showTyping();
try {
const resp = await fetch(BASE + '/api/sessions/' + sessionId + '/messages', {
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({text})
});
const data = await resp.json();
hideTyping();
const turns = data.session_data?.turns || [];
const last = turns[turns.length - 1];
if (last?.assistant_message?.text) addMessage(last.assistant_message.text);
} catch(e) {
hideTyping();
addMessage('Sorry, something went wrong. Please try again.', false);
}
btn.disabled = false;
input.focus();
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('userInput').addEventListener('keydown', e => {
if (e.key === 'Enter') sendMessage();
});

startSession();
</script>
</body>
</html>
