  n8n-db:
    image: postgres:16-alpine
    container_name: aios-n8n-db
    hostname: n8n-db
    networks:
      aios-app:
        ipv4_address: 10.20.0.15
    volumes:
      - n8n-db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD}
      POSTGRES_DB: n8n
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: aios-n8n
    hostname: n8n
    networks:
      aios-app:
        ipv4_address: 10.20.0.10
      aios-data:
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      n8n-db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: 10.20.0.15
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 168
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_METRICS: "true"
      N8N_METRICS_INCLUDE_DEFAULT_METRICS: "true"
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: 10.30.0.30
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_DB: 0
      N8N_PAYLOAD_SIZE_MAX: 16
      N8N_MULTI_USER: "true"
      WEBHOOK_URL: https://n8n.socialbeesai.com
      N8N_PROTOCOL: https
      N8N_HOST: n8n.socialbeesai.com
    restart: unless-stopped

  n8n-worker-1:
    image: n8nio/n8n:latest
    container_name: aios-n8n-worker-1
    hostname: n8n-worker-1
    networks:
      aios-app:
        ipv4_address: 10.20.0.13
      aios-data:
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      n8n-db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: 10.20.0.15
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: 10.30.0.30
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_DB: 0
      N8N_PAYLOAD_SIZE_MAX: 16
    command: worker --concurrency=10
    restart: unless-stopped

  n8n-worker-2:
    image: n8nio/n8n:latest
