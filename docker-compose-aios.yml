# AIOS +īŋŊGīŋŊGĮĨ AI Core Stack (Layer B)
# 7 Docker network zones +īŋŊGīŋŊGĮĨ never deviate from this structure

networks:
  aios-dmz:
    external: true
  aios-app:
    external: true
  aios-data:
    external: true
    internal: true
  aios-ai:
    external: true
  aios-voice:
    external: true
  aios-mon:
    external: true
  aios-foss:
    external: true

volumes:
  postgres-data:
  qdrant-data:
  minio-data:
  crowdsec-data:
  vault-data:
  asterisk-data:
  asterisk-log:
  mosquitto-data:
  mosquitto-log:
  clickhouse-data:
  ollama-data:
  n8n-data:
  n8n-db:
  prometheus-data:
  portainer-data:
  frigate-data:
  chatterbox-data:
  chatterbox-voices:
  chatterbox-output:

services:
  # +īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ
  # DMZ LAYER +īŋŊGīŋŊGĮĨ 10.10.0.0/24 (Added orphan containers)
  # +īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ

  traefik:
    image: traefik:latest
    container_name: aios-traefik
    hostname: traefik
    networks:
      aios-dmz:
        ipv4_address: 10.10.0.10
      aios-app:  # needs to reach n8n, keycloak, vault
      aios-mon:  # needs to reach grafana, dashy
      aios-data: # needs to reach minio, supabase
      aios-ai:   # needs to reach bifrost, ollama, frigate
      aios-voice: # needs to reach dograh, mosquitto
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /aios/configs/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /aios/configs/traefik/dynamic:/etc/traefik/dynamic:ro
      - /aios/configs/traefik/acme.json:/etc/traefik/acme.json
    environment:
      - CF_API_EMAIL=${CLOUDFLARE_EMAIL}
      - CF_DNS_API_TOKEN=${CLOUDFLARE_API_KEY}
    restart: unless-stopped

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: aios-crowdsec
    hostname: crowdsec
    networks:
      aios-dmz:
        ipv4_address: 10.10.0.11
    volumes:
      - crowdsec-data:/var/lib/crowdsec/data
      - /aios/configs/crowdsec:/etc/crowdsec
    environment:
      COLLECTIONS: "crowdsecurity/traefik crowdsecurity/linux"
      GID: ${CROWD_SEC_GID:-1000}
    restart: unless-stopped

  # +īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ
  # DATA LAYER +īŋŊGīŋŊGĮĨ 10.30.0.0/24
  # +īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ

  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    container_name: aios-postgres
    hostname: postgres
    networks:
      aios-data:
        ipv4_address: 10.30.0.10
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: aios
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: aios
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aios -d aios"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aios-qdrant
    hostname: qdrant
    networks:
      aios-data:
        ipv4_address: 10.30.0.20
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | head -1 | grep -q 200"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aios-redis
    hostname: redis
    networks:
      aios-data:
        ipv4_address: 10.30.0.30
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---
  # DATA LAYER CONTINUED --- Missing orphans
  # ---

  minio:
    image: minio/minio:latest
    container_name: aios-minio
    hostname: minio
    networks:
      aios-data:
        ipv4_address: 10.30.0.40
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---
  # DATA LAYER CONTINUED --- LAN Proxy for browser access
  # ---

  # MinIO Console proxy â access at http://10.0.0.100:9001
  data-minio-proxy:
    image: alpine/socat:latest
    container_name: aios-data-minio-proxy
    hostname: data-minio-proxy
    networks:
      aios-mon:
        ipv4_address: 10.60.0.80
      aios-data:
    ports:
      - "9001:9001"
    command: TCP-LISTEN:9001,fork,reuseaddr TCP:10.30.0.40:9001
    restart: unless-stopped

  # Qdrant Dashboard proxy â access at http://10.0.0.100:6333
  data-qdrant-proxy:
    image: alpine/socat:latest
    container_name: aios-data-qdrant-proxy
    hostname: data-qdrant-proxy
    networks:
      aios-mon:
        ipv4_address: 10.60.0.81
      aios-data:
    ports:
      - "6333:6333"
    command: TCP-LISTEN:6333,fork,reuseaddr TCP:10.30.0.20:6333
    restart: unless-stopped

  # ---
  # DATA LAYER CONTINUED --- Agent Memory (mem0)
  # ---

  mem0:
    build:
      context: /aios/configs/mem0
      dockerfile: Dockerfile.mem0
    image: aios-mem0:latest
    container_name: aios-mem0
    hostname: mem0
    networks:
      aios-app:
        ipv4_address: 10.20.0.50
      aios-data:
    ports:
      - "8000:8000"
    environment:
      QDRANT_HOST: 10.30.0.20
      QDRANT_PORT: 6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      EMBEDDING_BASE_URL: http://10.40.0.10:4000/v1
      EMBEDDING_MODEL: nomic-embed-text
      EMBEDDING_API_KEY: sk-aios-mem0
      LLM_BASE_URL: http://10.40.0.10:4000/v1
      LLM_MODEL: gemma-4-31b
      LLM_API_KEY: sk-aios-mem0
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---
  # DATA LAYER CONTINUED --- Document Parser (docling)
  # ---

  docling:
    build:
      context: /aios/configs/docling
      dockerfile: Dockerfile.docling
    image: aios-docling:latest
    container_name: aios-docling
    hostname: docling
    networks:
      aios-app:
        ipv4_address: 10.20.0.60
      aios-data:
    ports:
      - "8001:8000"
    environment:
      MINIO_ENDPOINT: 10.30.0.40:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; exit(0 if urllib.request.urlopen('http://localhost:8000/health').status in (200, 503) else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---
  # DATA LAYER CONTINUED --- Knowledge Ingestion Pipeline
  # ---

  knowledge-ingest:
    build:
      context: /aios/knowledge
      dockerfile: Dockerfile.knowledge
    image: aios-knowledge:latest
    container_name: aios-knowledge-ingest
    hostname: knowledge-ingest
    networks:
      aios-app:
        ipv4_address: 10.20.0.55
      aios-data:
    volumes:
      - /aios/knowledge/wiki:/app/wiki
    environment:
      MINIO_ENDPOINT: 10.30.0.40:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      INPUT_BUCKET: raw-uploads
      DOCLING_URL: http://10.20.0.60:8000/v1
      QDRANT_HOST: 10.30.0.20
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      EMBEDDING_URL: http://10.40.0.10:4000/v1/embeddings
      EMBEDDING_MODEL: nomic-embed-text
      EMBEDDING_API_KEY: sk-aios-bifrost
    depends_on:
      qdrant:
        condition: service_healthy
      docling:
        condition: service_started
    restart: unless-stopped

  # ---
  # MONITORING LAYER --- 10.60.0.0/24 (AI Observability)
  # ---

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: aios-clickhouse
    hostname: clickhouse
    networks:
      aios-mon:
        ipv4_address: 10.60.0.11
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - /aios/configs/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - /aios/configs/clickhouse/keeper.xml:/etc/clickhouse-server/config.d/keeper.xml:ro
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'SELECT 1' >&3 && cat <&3 | head -1 | grep -q 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:latest
    container_name: aios-langfuse
    hostname: langfuse
    networks:
      aios-data:
        ipv4_address: 10.30.0.50
      aios-mon:
        ipv4_address: 10.60.0.10
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://aios:${POSTGRES_PASSWORD}@10.30.0.10:5432/langfuse?sslmode=disable
      CLICKHOUSE_URL: http://default:clickhouse@10.60.0.11:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://default:clickhouse@10.60.0.11:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://10.30.0.40:9000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      HOSTNAME: 0.0.0.0
      NEXTAUTH_URL: http://10.60.0.10:3000
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    restart: unless-stopped

  dashy:
    image: lissy93/dashy:latest
    container_name: aios-dashy
    hostname: dashy
    networks:
      aios-mon:
        ipv4_address: 10.60.0.70
    volumes:
      - /aios/configs/dashy/conf.yml:/app/user-data/conf.yml:ro
    ports:
      - "8082:8080"
    environment:
      PORT: 8080
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://127.0.0.1:8080"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: aios-prometheus
    hostname: prometheus
    networks:
      aios-mon:
        ipv4_address: 10.60.0.20
    volumes:
      - prometheus-data:/prometheus
      - /aios/configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.external-url=http://monitor.socialbeesai.com/prometheus'
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: aios-loki
    hostname: loki
    networks:
      aios-mon:
        ipv4_address: 10.60.0.40
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: aios-grafana
    hostname: grafana
    networks:
      aios-mon:
        ipv4_address: 10.60.0.30
      aios-data:
    volumes:
      - /aios/configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - /aios/configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/sysops.json
      GF_SERVER_ROOT_URL: https://monitor.socialbeesai.com/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: true
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: aios-portainer
    hostname: portainer
    networks:
      aios-mon:
        ipv4_address: 10.60.0.50
      aios-dmz:
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer-data:/data
    command: --http-enabled
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: aios-cadvisor
    hostname: cadvisor
    networks:
      aios-mon:
        ipv4_address: 10.60.0.60
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: aios-node-exporter
    hostname: node-exporter
    networks:
      aios-mon:
        ipv4_address: 10.60.0.61
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    restart: unless-stopped

  # ---
  # AI LAYER --- 10.40.0.0/24 (Inference + Gateway)
  # ---

  bifrost:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: aios-bifrost
    hostname: bifrost
    networks:
      aios-ai:
        ipv4_address: 10.40.0.10
      aios-data:
    ports:
      - "4000:4000"
    volumes:
      - /aios/configs/bifrost/config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CONFIG_FILE_PATH: /app/config.yaml
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness').status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: aios-ollama
    hostname: ollama
    networks:
      aios-ai:
        ipv4_address: 10.40.0.20
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      OLLAMA_KEEP_ALIVE: 300s
      OLLAMA_NUM_PARALLEL: 1
      OLLAMA_MAX_LOADED_MODELS: 1
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Pre-pull models at startup (runs once, exits)
  ollama-pull:
    image: ollama/ollama:latest
    container_name: aios-ollama-pull
    entrypoint: [""]
    networks:
      aios-ai:
    volumes:
      - ollama-data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://10.40.0.20:11434
    command: >
      sh -c "
        echo 'Pulling nomic-embed-text...' &&
        ollama pull nomic-embed-text &&
        echo 'Pulling qwen2.5:7b-instruct-q4_K_M...' &&
        ollama pull qwen2.5:7b-instruct-q4_K_M &&
        echo 'Pulling llama3.2:3b-instruct-q4_K_M...' &&
        ollama pull llama3.2:3b-instruct-q4_K_M &&
        echo 'Pulling llava:7b-q4_K_M...' &&
        ollama pull llava:7b-q4_K_M &&
        echo 'Done.'
      "
    restart: "no"





