  asterisk:
    build:
      context: /aios/configs/asterisk
      dockerfile: Dockerfile.asterisk
    image: aios-asterisk:latest
    container_name: aios-asterisk
    hostname: asterisk
    network_mode: host
    ports:
      - "8088:8088/tcp"
    volumes:
      - /aios/configs/asterisk:/etc/asterisk
      - asterisk-data:/var/spool/asterisk
      - asterisk-log:/var/log/asterisk
    environment:
      EXT_100_SECRET: ${EXT_100_SECRET}
      EXT_101_SECRET: ${EXT_101_SECRET}
      EXT_102_SECRET: ${EXT_102_SECRET}
      EXT_9000_SECRET: ${EXT_9000_SECRET}
      EXT_103_SECRET: ${EXT_103_SECRET}
      EXT_104_SECRET: ${EXT_104_SECRET}
      ARI_ADMIN_PASSWORD: ${ARI_ADMIN_PASSWORD}
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    healthcheck:
      test: ["CMD", "asterisk", "-C", "/run/asterisk-configs/asterisk.conf", "-rx", "core ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  dnsmasq-tftp:
    image: andyshinn/dnsmasq
    container_name: aios-dnsmasq-tftp
    hostname: dnsmasq-tftp
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - /tftp:/tftp
      - /aios/configs/dnsmasq/dnsmasq-tftp.conf:/etc/dnsmasq.conf
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: aios-mosquitto
    hostname: mosquitto
    networks:
      aios-voice:
        ipv4_address: 10.50.0.20
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - /aios/configs/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped

  # ---
  # VOICE LAYER CONTINUED --- Dograh (Voice Orchestration)
  # ---

  dograh-db-init:
    image: postgres:16-alpine
    container_name: aios-dograh-db-init
    networks:
      aios-data:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    command: >
      sh -c "
        psql -h 10.30.0.10 -U aios -d postgres -tc \"SELECT 1 FROM pg_database WHERE datname = 'dograh'\" | grep -q 1 ||
        psql -h 10.30.0.10 -U aios -d postgres -c 'CREATE DATABASE dograh'
      "
    restart: on-failure:3

  dograh-api:
    image: dograhai/dograh-api:latest
    container_name: aios-dograh-api
    hostname: dograh-api
    networks:
      aios-voice:
        ipv4_address: 10.50.0.30
      aios-data:
      aios-ai:
    ports:
      - "127.0.0.1:8085:8000/tcp"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      dograh-db-init:
        condition: service_started
    environment:
      ENVIRONMENT: production
      DEPLOYMENT_MODE: oss
      DATABASE_URL: postgresql+asyncpg://aios:${POSTGRES_PASSWORD}@10.30.0.10:5432/dograh
      REDIS_URL: redis://10.30.0.30:6379/0
      MINIO_ENDPOINT: 10.30.0.40:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_PUBLIC_ENDPOINT: https://data.socialbeesai.com/minio
      OSS_JWT_SECRET: ${DOGRAH_JWT_SECRET}
      BACKEND_API_ENDPOINT: http://10.50.0.30:8000
      API_URL: http://10.50.0.30:8000
      ENABLE_TELEMETRY: "false"
      LOG_LEVEL: debug
    healthcheck:
      test: ["CMD-SHELL", 'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/api/v1/health'').read()"']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  dograh-ui:
    image: dograhai/dograh-ui:latest
    container_name: aios-dograh-ui
    hostname: dograh-ui
    networks:
      aios-voice:
        ipv4_address: 10.50.0.31
    depends_on:
      - dograh-api
    environment:
      BACKEND_URL: https://voice.socialbeesai.com
      NODE_ENV: oss
      ENABLE_TELEMETRY: "false"
    ports:
      - "3010:3010"
    restart: unless-stopped

