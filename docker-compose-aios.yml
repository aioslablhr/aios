  gitops:
    image: alpine:latest
    container_name: aios-gitops
    hostname: gitops
    networks:
      aios-app:
        ipv4_address: 10.20.0.100
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /aios:/aios
      - ~/.ssh:/root/.ssh
    environment:
      GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=accept-new"
    command: >
      sh -c "
        apk add --no-cache git docker-cli >/dev/null 2>&1 &&
        echo '[GitOps] Watching github.com:aioslablhr/aios.git every 30s' &&
        while true; do
          cd /aios &&
          REMOTE_SHA=$$(timeout 10 git ls-remote origin HEAD 2>/dev/null | awk '{print $$1}') &&
          LOCAL_SHA=$$(git rev-parse HEAD 2>/dev/null) &&
          if [ -n \"$$REMOTE_SHA\" ] && [ \"$$REMOTE_SHA\" != \"$$LOCAL_SHA\" ]; then
            echo '[GitOps] Change detected, pulling...' &&
            timeout 10 git pull --ff-only origin main 2>/dev/null &&
            chown -R ai:ai /aios/.git 2>/dev/null || true &&
            docker compose -f /aios/docker-compose-aios.yml up -d 2>/dev/null &&
            echo '[GitOps] Deployed commit: '$$(git rev-parse --short HEAD)
          fi &&
          sleep 30
        done
      "
    restart: unless-stopped

  # ├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É
  # DEV LAYER ├óΓé¼ΓÇ¥ Hermes Agent (24/7 Autonomous Ops)
  # ├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É

  hermes:
    image: alpine:latest
    container_name: aios-hermes
    hostname: hermes
    pid: host
    networks:
      aios-app:
        ipv4_address: 10.20.0.70
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /aios/scripts:/scripts:ro
    command: >
      sh -c "
        apk add --no-cache docker-cli jq util-linux >/dev/null 2>&1 &&
        exec /scripts/hermes.sh
      "
