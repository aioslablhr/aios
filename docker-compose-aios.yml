# AIOS ├óΓé¼ΓÇ¥ AI Core Stack (Layer B)
# 7 Docker network zones ├óΓé¼ΓÇ¥ never deviate from this structure

networks:
  aios-dmz:
    external: true
  aios-app:
    external: true
  aios-data:
    external: true
    internal: true
  aios-ai:
    external: true
  aios-voice:
    external: true
  aios-mon:
    external: true
  aios-foss:
    external: true

volumes:
  postgres-data:
  qdrant-data:
  minio-data:
  crowdsec-data:
  vault-data:
  asterisk-data:
  asterisk-log:
  mosquitto-data:
  mosquitto-log:
  clickhouse-data:
  ollama-data:
  n8n-data:
  n8n-db:

services:
  # ├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É
  # DATA LAYER ├óΓé¼ΓÇ¥ 10.30.0.0/24
  # ├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É

  postgres:
    image: postgres:16-alpine
    container_name: aios-postgres
    hostname: postgres
    networks:
      aios-data:
        ipv4_address: 10.30.0.10
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: aios
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: aios
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aios -d aios"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aios-qdrant
    hostname: qdrant
    networks:
      aios-data:
        ipv4_address: 10.30.0.20
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | head -1 | grep -q 200"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aios-redis
    hostname: redis
    networks:
      aios-data:
        ipv4_address: 10.30.0.30
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---
  # MONITORING LAYER --- 10.60.0.0/24 (AI Observability)
  # ---

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: aios-clickhouse
    hostname: clickhouse
    networks:
      aios-mon:
        ipv4_address: 10.60.0.11
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - /aios/configs/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - /aios/configs/clickhouse/keeper.xml:/etc/clickhouse-server/config.d/keeper.xml:ro
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'SELECT 1' >&3 && cat <&3 | head -1 | grep -q 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:latest
    container_name: aios-langfuse
    hostname: langfuse
    networks:
      aios-data:
        ipv4_address: 10.30.0.50
      aios-mon:
        ipv4_address: 10.60.0.10
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://aios:${POSTGRES_PASSWORD}@10.30.0.10:5432/langfuse?sslmode=disable
      CLICKHOUSE_URL: http://default:clickhouse@10.60.0.11:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://default:clickhouse@10.60.0.11:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://10.30.0.40:9000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      HOSTNAME: 0.0.0.0
      NEXTAUTH_URL: http://10.60.0.10:3000
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    restart: unless-stopped

  # ---
  # AI LAYER --- 10.40.0.0/24 (Inference + Gateway)
  # ---

  bifrost:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: aios-bifrost
    hostname: bifrost
    networks:
      aios-ai:
        ipv4_address: 10.40.0.10
      aios-data:
    ports:
      - "4000:4000"
    volumes:
      - /aios/configs/bifrost/config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CONFIG_FILE_PATH: /app/config.yaml
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness').status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: aios-ollama
    hostname: ollama
    networks:
      aios-ai:
        ipv4_address: 10.40.0.20
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped





  # ├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É
