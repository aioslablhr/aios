  # SECURITY LAYER +īŋŊGīŋŊGĮĨ 10.20.0.0/24
  # +īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ+īŋŊGīŋŊīŋŊ-īŋŊ

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: aios-keycloak
    hostname: keycloak
    networks:
      aios-app:
        ipv4_address: 10.20.0.40
      aios-data:
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_HOSTNAME: keycloak.socialbeesai.com
      KC_HOSTNAME_PORT: 443
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://10.30.0.10:5432/keycloak
      KC_DB_USERNAME: aios
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
    command: start-dev
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | head -1 | grep -q 200"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  vault:
    image: hashicorp/vault:latest
    container_name: aios-vault
    hostname: vault
    network_mode: host
    user: root
    volumes:
      - /aios/data/vault:/vault/file
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_API_ADDR: http://10.0.0.100:8200
      VAULT_CLUSTER_ADDR: https://10.0.0.100:8201
      VAULT_DEV_LISTEN_ADDRESS: ""
      VAULT_LOCAL_CONFIG: |
        storage "raft" {
          path = "/vault/file"
          node_id = "aios-vault-1"
        }
        listener "tcp" {
          address = "0.0.0.0:8200"
          tls_disable = true
        }
        disable_mlock = true
        ui = true
    command: server
    healthcheck:
      test: ["CMD-SHELL", "vault status >/dev/null 2>&1 || test $? -eq 2"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  vault-unseal:
    image: hashicorp/vault:latest
    container_name: aios-vault-unseal
    network_mode: host
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - /aios/.vault-keys:/vault/config/.vault-keys:ro
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    entrypoint: ""
    command: >
      sh -c "
        for i in $$(seq 1 10); do
          STATUS=$$(/bin/vault status -format=json 2>/dev/null)
          SEALED=$$(echo \"$$STATUS\" | grep '\"sealed\"' | awk '{print $$2}' | tr -d ' ,')
          INIT=$$(echo \"$$STATUS\" | grep '\"initialized\"' | awk '{print $$2}' | tr -d ' ,')
          if [ \"$$INIT\" = 'true' ] && [ \"$$SEALED\" = 'true' ]; then
            echo '[Vault-Unseal] Sealed īŋŊ unsealing...'
            grep '^  Key' /vault/config/.vault-keys | head -3 | awk '{print $$NF}' | while read key; do
              /bin/vault operator unseal \"$$key\" >/dev/null
            done
            echo '[Vault-Unseal] Done īŋŊ vault is unsealed'
            break
          elif [ \"$$INIT\" = 'true' ] && [ \"$$SEALED\" = 'false' ]; then
            echo '[Vault-Unseal] Already unsealed'
            break
          fi
          echo '[Vault-Unseal] Waiting for vault...'
          sleep 3
        done
        while true; do sleep 3600; done
