  postgres:
    image: postgres:16-alpine
    container_name: aios-postgres
    hostname: postgres
    networks:
      aios-data:
        ipv4_address: 10.30.0.10
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: aios
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aios_secret_2026}
      POSTGRES_DB: aios
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aios -d aios"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aios-qdrant
    hostname: qdrant
    networks:
      aios-data:
        ipv4_address: 10.30.0.20
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-aios_qdrant_2026}
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | head -1 | grep -q 200"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

