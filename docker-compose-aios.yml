  vault:
    image: hashicorp/vault:latest
    container_name: aios-vault
    hostname: vault
    network_mode: host
    user: root
    volumes:
      - /aios/data/vault:/vault/file
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_API_ADDR: http://10.0.0.100:8200
      VAULT_CLUSTER_ADDR: https://10.0.0.100:8201
      VAULT_DEV_LISTEN_ADDRESS: ""
      VAULT_LOCAL_CONFIG: |
        storage "raft" {
          path = "/vault/file"
          node_id = "aios-vault-1"
        }
        listener "tcp" {
          address = "0.0.0.0:8200"
          tls_disable = true
        }
        disable_mlock = true
        ui = true
    command: server
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

