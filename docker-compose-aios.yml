  # ├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É

  vault:
    image: hashicorp/vault:latest
    container_name: aios-vault
    hostname: vault
    network_mode: host
    user: root
    volumes:
      - /aios/data/vault:/vault/file
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_API_ADDR: http://10.0.0.100:8200
      VAULT_CLUSTER_ADDR: https://10.0.0.100:8201
      VAULT_DEV_LISTEN_ADDRESS: ""
      VAULT_LOCAL_CONFIG: |
        storage "raft" {
          path = "/vault/file"
          node_id = "aios-vault-1"
        }
        listener "tcp" {
          address = "0.0.0.0:8200"
          tls_disable = true
        }
        disable_mlock = true
        ui = true
    command: server
    healthcheck:
      test: ["CMD-SHELL", "vault status >/dev/null 2>&1 || test $? -eq 2"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  vault-unseal:
    image: hashicorp/vault:latest
    container_name: aios-vault-unseal
    network_mode: host
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - /aios/.vault-keys:/vault/config/.vault-keys:ro
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    entrypoint: ""
    command: >
      sh -c "
        for i in $$(seq 1 10); do
          STATUS=$$(/bin/vault status -format=json 2>/dev/null)
          SEALED=$$(echo \"$$STATUS\" | grep '\"sealed\"' | awk '{print $$2}' | tr -d ' ,')
          INIT=$$(echo \"$$STATUS\" | grep '\"initialized\"' | awk '{print $$2}' | tr -d ' ,')
          if [ \"$$INIT\" = 'true' ] && [ \"$$SEALED\" = 'true' ]; then
            echo '[Vault-Unseal] Sealed — unsealing...'
            grep '^  Key' /vault/config/.vault-keys | head -3 | awk '{print $$NF}' | while read key; do
              /bin/vault operator unseal \"$$key\" >/dev/null
            done
            echo '[Vault-Unseal] Done — vault is unsealed'
            break
          elif [ \"$$INIT\" = 'true' ] && [ \"$$SEALED\" = 'false' ]; then
            echo '[Vault-Unseal] Already unsealed'
            break
          fi
          echo '[Vault-Unseal] Waiting for vault...'
          sleep 3
        done
        while true; do sleep 3600; done
      "
    restart: unless-stopped

  # ├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É
  # DEV LAYER ├óΓé¼ΓÇ¥ GitOps Agent
  # ├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É├óΓÇó┬É

  gitops:
    image: alpine:latest
    container_name: aios-gitops
    hostname: gitops
    networks:
      aios-app:
        ipv4_address: 10.20.0.100
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /aios:/aios
      - ~/.ssh:/root/.ssh
    environment:
      GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=accept-new"
    command: >
      sh -c "
        apk add --no-cache git docker-cli openssh >/dev/null 2>&1 &&
        git config --global --add safe.directory /aios &&
        echo '[GitOps] Watching github.com:aioslablhr/aios.git every 30s' &&
        while true; do
          cd /aios &&
          REMOTE_SHA=$$(timeout 10 git ls-remote origin HEAD 2>&1) &&
          LOCAL_SHA=$$(git rev-parse HEAD 2>&1) &&
          if echo \"$$REMOTE_SHA\" | grep -q '^[a-f0-9]\{40\}' && \
             [ \"$$REMOTE_SHA\" != \"$$LOCAL_SHA\" ]; then
            echo '[GitOps] Change detected, pulling...' &&
            if timeout 10 git pull --ff-only origin main; then
              docker compose -f /aios/docker-compose-aios.yml up -d &&
              echo '[GitOps] Deployed commit: '$$(git rev-parse --short HEAD)
            else
              echo '[GitOps] Pull failed, will retry in 30s'
            fi
          fi &&
          sleep 30
        done
      "
    restart: unless-stopped

