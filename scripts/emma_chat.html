<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Emma - SHIN Travels</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#1a1a2e;height:100vh;display:flex;flex-direction:column;color:#fff}
.header{background:#16213e;padding:16px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #0f3460}
.header h1{font-size:1.1rem;color:#e94560}
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;padding:12px 16px;border-radius:12px;line-height:1.5;font-size:0.9rem}
.bot{background:#16213e;align-self:flex-start;border:1px solid #0f3460;color:#fff}
.user{background:#e94560;color:#fff;align-self:flex-end}
.input-area{padding:16px 24px;background:#16213e;border-top:1px solid #0f3460;display:flex;gap:12px}
.input-area input{flex:1;padding:12px 16px;background:#1a1a2e;border:1px solid #0f3460;border-radius:8px;color:#fff;font-size:0.9rem;outline:none}
.input-area input:focus{border-color:#e94560}
.input-area button{padding:12px 24px;background:#e94560;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600}
.typing{color:#888;font-size:0.8rem;padding:4px 16px}
</style></head><body>
<div class="header"><h1>Emma</h1><span>SHIN Travels</span><button onclick="location.reload()" style="background:none;border:1px solid rgba(255,255,255,0.3);color:#fff;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:0.75rm;margin-left:auto">New</button></div>
<div class="chat" id="chat"></div>
<div class="input-area">
<input id="input" placeholder="Ask Emma about travel..." autofocus />
<button id="sendBtn">Send</button>
</div>
<script>
var TC=0;
var TK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxIiwiZW1haWwiOiJzb2NpYWxiZWVzYWlvc0BnbWFpbC5jb20iLCJleHAiOjE3ODQzMDI1MDksImlhdCI6MTc4MTcxMDUwOX0.yiXmH0FiIiKC3KvrEjBq_RDwlTVhKYHc1u3_-uuCsGU";
var API="http://10.0.0.100:8085/api/v1";
var sid=null;
function addMsg(t,r){var c=document.getElementById("chat");var d=document.createElement("div");d.className="msg "+r;d.textContent=t;c.appendChild(d);c.scrollTop=c.scrollHeight}
function setTyping(o){var t=document.getElementById("typing");if(o&&!t){var d=document.createElement("div");d.className="typing";d.id="typing";d.textContent="Emma is thinking...";document.getElementById("chat").appendChild(d)}else if(!o&&t){t.remove()}}
function getLastAssistant(d){var turns=d.session_data&&d.session_data.turns;if(turns&&turns.length>0){for(var i=turns.length-1;i>=0;i--){var am=turns[i].assistant_message;if(am&&am.text)return am.text}}return""}
function init(){addMsg("Connecting to Emma...","bot");var x=new XMLHttpRequest();x.open("POST",API+"/workflow/1/text-chat/sessions",true);x.setRequestHeader("Authorization","Bearer "+TK);x.setRequestHeader("Content-type","application/json");x.onload=function(){try{var d=JSON.parse(x.responseText);sid=d.workflow_run_id;var g=getLastAssistant(d);document.getElementById("chat").innerHTML="";if(g)addMsg(g,"bot");else addMsg("Hello, this is Emma from SHIN Travels.","bot")}catch(e){addMsg("Connection error","bot")}};x.onerror=function(){addMsg("Cannot reach server","bot")};x.send("{}")}
function sendMsg(){var i=document.getElementById("input");var t=i.value.trim();if(!t)return;i.value="";document.getElementById("sendBtn").disabled=true;addMsg(t,"user");setTyping(true);if(!sid){inew();setTimeout(function(){sendMsg()},500);return}var x=new XMLHttpRequest();x.open("POST",API+"/workflow/1/text-chat/sessions/"+sid+"/messages",true);x.setRequestHeader("Authorization","Bearer "+TK);x.setRequestHeader("Content-type","application/json");x.onload=function(){setTyping(false);document.getElementById("sendBtn").disabled=false;try{var d=JSON.parse(x.responseText);var r=getLastAssistant(d);if(r)addMsg(r,"bot");else addMsg("(no response)","bot")}catch(e){addMsg("Parse error","bot")}};x.onerror=function(){setTyping(false);document.getElementById("sendBtn").disabled=false;addMsg("Network error","bot")};x.send(JSON.stringify({text:t}))}
function inew(){sid=null;document.getElementById("chat").innerHTML="";init()}
document.addEventListener("DOMContentLoaded",function(){setTimeout(init,500)});
document.getElementById("input").addEventListener("keydown",function(e){if(e.key==="Enter")sendMsg()});
</script></body></html>
